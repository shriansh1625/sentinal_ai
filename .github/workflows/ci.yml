name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Engine purity
        run: pnpm purity

      - name: Dependency direction
        run: pnpm depcruise

      - name: Doc lint
        run: pnpm doc-lint

      - name: Budget constants
        run: pnpm bench:budgets

      - name: Integration tests
        run: pnpm exec vitest run --config tests/integration/vitest.config.ts

      - name: Verify extension bundle
        run: pnpm --filter @sentinel-shield/extension verify:bundle

      - name: Audit (high+)
        run: pnpm audit --audit-level=high
